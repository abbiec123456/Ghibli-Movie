<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Floating clouds -->
    <div class="cloud small"></div>
    <div class="cloud large"></div>

    <!-- Header banner -->
    <div class="header">
        <h1>Studio Ghibli Movie Maker</h1>
        <p>Administrator Access Portal</p>
    </div>

    <!-- Login box -->
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="email" name="email" placeholder="Admin Email" required>

            <div class="password-wrapper">
                <input type="password" name="password" id="admin_password" placeholder="Password" required>
                <span onclick="toggleAdminPassword()" class="toggle-password">👁️</span>
            </div>
            
            <button type="submit">Enter Admin Panel</button>
        </form>
    </div>

    <p class="auth-switch">
        Return to 
        <a href="{{ url_for('customer_login') }}">Customer Login</a>
    </p>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>

</body>
</html>
