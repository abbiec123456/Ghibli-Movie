<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="cloud small"></div>
  <div class="cloud large"></div>

  <div class="header">
    <h1>Admin Dashboard</h1>
    <p>Manage bookings</p>
  </div>

  <div class="dashboard">
    <h2>Bookings</h2>
	<a href="{{ url_for('manage_courses') }}">Manage Courses</a>

    {% for b in bookings %}
      <div class="booking">
        <p><strong>Email:</strong>
	 {{ b.email }}</p>
        <p><strong>Course:</strong> 
	{{ b.course }}</p>      
      	<a href="{{ url_for('edit_booking', booking_id=b["id"]) }}">Edit booking</a>
      </div>
    {% endfor %}

    <a href="/">Back</a>
  </div>

</body>
</html>
