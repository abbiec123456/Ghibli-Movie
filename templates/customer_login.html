<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Floating clouds -->
    <div class="cloud small"></div>
    <div class="cloud large"></div>

    <!-- Header banner -->
    <div class="header">
        <h1>Studio Ghibli Movie Maker</h1>
        <p>Create magical stories through animation</p>
    </div>

    <!-- Login box -->
    <div class="container">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden"
                   name="csrf_token"
                   value="{{ csrf_token() }}"/>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <div style="position: relative;">
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Password"
                    required
                    style="padding-right:40px;"
                >

                <span onclick="togglePassword()"
                      style="
                        position:absolute;
                        right:10px;
                        top:50%;
                        transform:translateY(-50%);
                        cursor:pointer;">
                    👁️
                </span>
            </div>

            <button type="submit">Enter the Studio</button>
        </form>

    </div>

    <p class="auth-switch">
        Don’t have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </p>

    <script>
        function togglePassword() {
            const password =
                document.getElementById("password");

            password.type =
                password.type === "password"
                    ? "text"
                    : "password";
        }
    </script>

</body>
</html>
