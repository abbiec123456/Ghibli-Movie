<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manage Bookings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .delete-btn { color: #e63946; background: none; border: 1px solid #e63946; border-radius: 4px; cursor: pointer; padding: 2px 8px; margin-left: 10px; }
    .delete-btn:hover { background: #e63946; color: white; }
    .actions { margin-top: 10px; display: flex; align-items: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Manage Bookings</h1>
    <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
  </div>

  <div class="dashboard">
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for msg in messages %}<p>{{ msg }}</p>{% endfor %}{% endif %}
    {% endwith %}

    {% for b in bookings %}
      <div class="booking">
        <p><strong>ID:</strong> #{{ b.id }}</p>
        <p><strong>Customer:</strong> {{ b.email }}</p>
        <p><strong>Course:</strong> {{ b.course }}</p>
        <div class="actions">
            <a href="{{ url_for('edit_booking', booking_id=b.id) }}">Edit</a>
            <form action="{{ url_for('delete_booking', booking_id=b.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Delete this booking?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </div>
      </div>
    {% endfor %}
  </div>
</body>
</html>
